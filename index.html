<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#232A1E">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>REBUILD — Block 1</title>
<script>
if ("serviceWorker" in navigator && location.protocol === "https:") {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
}
</script>
<style>
:root{
  --bg:#232A1E;
  --surface:#2D3526;
  --surface2:#363F2D;
  --line:#4A5340;
  --ink:#E8E4D4;
  --ink-dim:#A8A385;
  --accent:#F2762E;
  --accent-dim:#B3561F;
  --ok:#9DBF6B;
  --warn:#E0B14B;
  --danger:#D96B5B;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45;
  padding-bottom:76px;
}
.hdr{
  padding:18px 16px 10px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--bg);z-index:20;
}
.hdr .eyebrow{
  font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:700;
}
.hdr h1{
  font-size:21px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;
}
.hdr .sub{font-size:11px;color:var(--ink-dim);letter-spacing:.06em;margin-top:2px}
.wrap{padding:14px 14px 30px;max-width:560px;margin:0 auto}

/* week pills */
.weeks{display:flex;gap:8px;margin-bottom:14px}
.wk{
  flex:1;padding:9px 0;text-align:center;border:1px solid var(--line);
  border-radius:var(--radius);font-size:12px;font-weight:700;letter-spacing:.12em;
  color:var(--ink-dim);background:var(--surface);cursor:pointer;user-select:none;
}
.wk.active{background:var(--accent);border-color:var(--accent);color:#1E1508}

/* day cards */
.daycard{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;cursor:pointer;
}
.daycard .desig{
  font-size:10px;letter-spacing:.24em;color:var(--accent);font-weight:700;text-transform:uppercase;
}
.daycard h3{font-size:16px;font-weight:800;letter-spacing:.05em;margin-top:3px;text-transform:uppercase}
.daycard .meta{font-size:12px;color:var(--ink-dim);margin-top:3px}
.daycard .status{
  float:right;font-size:10px;letter-spacing:.14em;font-weight:700;padding:4px 9px;border-radius:20px;
  border:1px solid var(--line);color:var(--ink-dim);text-transform:uppercase;
}
.daycard .status.done{border-color:var(--ok);color:var(--ok)}
.daycard .status.part{border-color:var(--warn);color:var(--warn)}
.daycard.optional{border-style:dashed}

/* day detail */
.back{
  display:inline-block;font-size:12px;letter-spacing:.14em;font-weight:700;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px;cursor:pointer;
}
.daytitle .desig{font-size:10px;letter-spacing:.24em;color:var(--accent);font-weight:700;text-transform:uppercase}
.daytitle h2{font-size:20px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin:2px 0 2px}
.daytitle .note{font-size:12px;color:var(--ink-dim);margin-bottom:14px}

.ex{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;
}
.ex-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.ex-head .nm{font-weight:700;font-size:14.5px}
.ex-head .rx{font-size:12px;color:var(--ink-dim);margin-top:1px}
.ex-head .rx b{color:var(--accent);font-weight:700}
.ex-head .dots{display:flex;gap:4px;flex-shrink:0}
.dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--ink-dim)}
.dot.f{background:var(--ok);border-color:var(--ok)}
.ex-body{border-top:1px solid var(--line);padding:10px 14px 12px;display:none}
.ex.open .ex-body{display:block}
.ex .cue{font-size:11.5px;color:var(--warn);margin-bottom:8px;line-height:1.4}
.setrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.setrow .sn{font-size:11px;font-weight:700;color:var(--ink-dim);width:34px;letter-spacing:.08em}
.setrow input{
  width:70px;padding:8px 6px;background:var(--bg);border:1px solid var(--line);border-radius:7px;
  color:var(--ink);font-size:15px;text-align:center;font-weight:600;
}
.setrow input:focus{outline:none;border-color:var(--accent)}
.setrow .x{color:var(--ink-dim);font-size:12px}
.setrow .chk{
  margin-left:auto;width:34px;height:34px;border-radius:8px;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:transparent;
  flex-shrink:0;
}
.setrow .chk.f{background:var(--ok);border-color:var(--ok);color:#1E2415}
.unitlbl{font-size:10px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase;display:flex;gap:0;margin-bottom:5px}
.unitlbl span:first-child{width:34px}
.unitlbl span:nth-child(2){width:78px}
.unitlbl span:nth-child(3){width:78px}

.sessnote{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  color:var(--ink);padding:11px;font-size:14px;font-family:inherit;min-height:64px;resize:vertical;margin-top:6px}
.sessnote:focus{outline:none;border-color:var(--accent)}
.lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);font-weight:700;margin:16px 0 6px}

/* tabs */
.tabs{
  position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);
  border-top:1px solid var(--line);z-index:30;padding-bottom:env(safe-area-inset-bottom);
}
.tab{flex:1;padding:13px 0 11px;text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink-dim);cursor:pointer;user-select:none}
.tab.active{color:var(--accent)}
.tab .ic{display:block;font-size:17px;margin-bottom:2px}

/* targets & progress */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card h3{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:9px}
.krow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
.krow:last-child{border-bottom:none}
.krow .k{color:var(--ink-dim)}
.krow .v{font-weight:700}
.card p{font-size:13.5px;color:var(--ink);margin-bottom:8px;line-height:1.5}
.card p:last-child{margin-bottom:0}
.card .dim{color:var(--ink-dim);font-size:12.5px}
.rule{border-left:3px solid var(--danger);padding-left:10px;margin-bottom:10px;font-size:13.5px}
.rule b{color:var(--danger);letter-spacing:.08em;text-transform:uppercase;font-size:11px;display:block;margin-bottom:2px}
.road{display:flex;gap:10px;margin-bottom:12px}
.road .mo{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--accent);width:56px;flex-shrink:0;padding-top:2px}
.road .tx{font-size:13px;line-height:1.45}
.btn{
  display:block;width:100%;padding:12px;text-align:center;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--surface2);color:var(--ink);font-size:12px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;cursor:pointer;margin-bottom:8px;font-family:inherit;
}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1E1508}
.prog-lift{margin-bottom:4px}
.bar-wrap{background:var(--bg);border-radius:6px;height:22px;position:relative;overflow:hidden;margin:4px 0 10px;border:1px solid var(--line)}
.bar{height:100%;background:var(--accent-dim);border-radius:5px;display:flex;align-items:center;
  padding-left:8px;font-size:11px;font-weight:700;color:var(--ink);min-width:36px;white-space:nowrap}
.storage-warn{background:var(--surface);border:1px solid var(--warn);border-radius:var(--radius);padding:10px 12px;
  font-size:12.5px;color:var(--warn);margin-bottom:12px;display:none}
.empty{color:var(--ink-dim);font-size:13.5px;text-align:center;padding:20px 0}
</style>
</head>
<body>

<div class="hdr">
  <div class="eyebrow">Post-Op Block 1 · SLAP Rehab → Strength</div>
  <h1>Rebuild</h1>
  <div class="sub">4-week U/L split · Bench reintro · MU groundwork</div>
</div>

<div class="wrap">
  <div class="storage-warn" id="storageWarn">
    Storage unavailable in this preview — logs won't persist here. Download the file and open it in your phone's browser: logging will save permanently.
  </div>
  <div id="view"></div>
</div>

<div class="tabs">
  <div class="tab active" data-t="train"><span class="ic">▣</span>Train</div>
  <div class="tab" data-t="progress"><span class="ic">▲</span>Progress</div>
  <div class="tab" data-t="targets"><span class="ic">◎</span>Targets</div>
</div>

<script>
/* ================= PROGRAM DATA ================= */
const KG = "kg", BW = "BW", SEC = "sec";

// weekly loads for progressed main lifts [w1,w2,w3,w4]
const PROG = {
  bench:   [40, 50, 57.5, 65],
  squat:   [100, 107.5, 115, 120],
  ohp:     [45, 47.5, 50, 52.5],
  dead:    [140, 150, 160, 170],
};

function ex(name, sets, reps, load, cue, unit){ return {name, sets, reps, load, cue: cue||"", unit: unit||KG}; }

function dayA(w){ return {
  desig:"UPPER A", title:"Horizontal · Bench Reintro",
  note:"Pressing RPE cap 7. Tempo on bench: 3s down, 1s pause, drive up. Any sharp anterior shoulder pain → stop the exercise, log it in notes.",
  exercises:[
    ex("Barbell Bench Press (reintro)", 3, "8", PROG.bench[w], "Week target: "+PROG.bench[w]+"kg. Only take the jump if last week was pain-free. Grip slightly narrower than your old comp grip. RPE ≤7.", KG),
    ex("Chest-Supported Row", 4, "8–10", "", "Squeeze 1s at top. This volume protects the repair — don't skip it."),
    ex("Incline DB Press (neutral-ish grip)", 3, "10–12", "", "Elbows ~45°. Neutral grip is shoulder-friendliest."),
    ex("Lat Pulldown or Strict Pull-Up", 3, "8–10", "", "Full scap depression at bottom."),
    ex("Cable Lateral Raise", 3, "12–15", "", "Light. Chase the burn, not the load."),
    ex("Face Pull", 3, "15", "", "External rotation at the end — this is your insurance policy."),
    ex("Triceps Pushdown", 3, "10–12", ""),
  ]};
}
function dayB(w){ return {
  desig:"LOWER A", title:"Squat Focus",
  note:"Main lift at RPE 7–8. Legs took no surgical hit — this is where you rebuild fastest.",
  exercises:[
    ex("Back Squat", 4, "6", PROG.squat[w], "Week target: "+PROG.squat[w]+"kg (~"+Math.round(PROG.squat[w]/160*100)+"% of old 1RM). RPE ≤8.", KG),
    ex("Romanian Deadlift", 3, "8", "", "2s eccentric, hamstring stretch."),
    ex("Leg Press", 3, "10–12", ""),
    ex("Seated Leg Curl", 3, "10–12", ""),
    ex("Standing Calf Raise", 4, "12", "", "Pause at stretch."),
    ex("Hanging Knee Raise", 3, "10–12", "", "Doubles as grip + hang tolerance for MU groundwork.", BW),
  ]};
}
function dayC(w){ return {
  desig:"UPPER B", title:"Vertical · OHP + Pull",
  note:"You're ahead of curve on OHP — progress it, don't rush it. Strict form only, no leg drive.",
  exercises:[
    ex("Standing Military Press", 3, "6", PROG.ohp[w], "Week target: "+PROG.ohp[w]+"kg. Strict. RPE ≤8. Any pinch overhead → drop 10% and finish there.", KG),
    ex("Strict Pull-Up (weighted if 4×8 BW is easy)", 4, "6–8", "", "Controlled. Dead-stop each rep. This is muscle-up currency.", BW),
    ex("Flat DB Press", 3, "10", "", "Complements barbell reintro without duplicating stress."),
    ex("Single-Arm Cable Row", 3, "10–12", "", "Per arm."),
    ex("Rear Delt Fly", 3, "15", ""),
    ex("EZ-Bar Curl", 3, "10", ""),
    ex("Hammer Curl", 3, "10", "", "Brachialis + forearm — pull-up carryover."),
  ]};
}
function dayD(w){ return {
  desig:"LOWER B", title:"Deadlift Focus",
  note:"Main lift RPE ≤8. Reset every rep — no touch-and-go this block.",
  exercises:[
    ex("Deadlift", 3, "5", PROG.dead[w], "Week target: "+PROG.dead[w]+"kg (~"+Math.round(PROG.dead[w]/220*100)+"% of old 1RM). Brace hard, no grinding.", KG),
    ex("Hack Squat or Front Squat", 3, "8", ""),
    ex("Bulgarian Split Squat", 3, "10", "", "Per leg. DBs in hand."),
    ex("Back Extension", 3, "12", "", "Add plate if easy."),
    ex("Seated Calf Raise", 4, "15", ""),
    ex("Cable Crunch", 3, "12", ""),
  ]};
}
function dayE(w){ return {
  desig:"DAY 5 · OPTIONAL", title:"Arms + MU Groundwork + Zone 2",
  note:"Only if you have fuel left. NO muscle-up or transition attempts this block — groundwork only. Every movement here must be 100% pain-free or it gets cut.",
  exercises:[
    ex("Dead Hang", 3, "30–45", "", "Full relax at bottom, then active shoulders. Building hang tolerance.", SEC),
    ex("Scapular Pull", 3, "8–10", "", "Straight arms, pure scap depression/retraction.", BW),
    ex("Explosive Strict Pull-Up (chest-to-bar intent)", 4, "3–5", "", "Max intent up, controlled down. Stop the set when speed drops.", BW),
    ex("Straight-Bar Support Hold", 3, "15–20", "", "Top of the bar, arms locked, BW only. This is the top half of your muscle-up.", SEC),
    ex("Incline DB Curl", 3, "12", ""),
    ex("Overhead Cable Triceps Extension", 3, "12", "", "Only if overhead position is pain-free."),
    ex("Zone 2 — Incline Walk / Bike", 1, "20–25", "", "Minutes. Conversational pace. Supports the cut without eating recovery.", "min"),
  ], optional:true};
}

function getWeek(w){ return [dayA(w), dayB(w), dayC(w), dayD(w), dayE(w)]; }

/* ================= STORAGE ================= */
let mem = {};
let persistent = true;
function store(k,v){
  mem[k]=v;
  try{ localStorage.setItem("rebuild1:"+k, JSON.stringify(v)); }
  catch(e){ persistent=false; showWarn(); }
}
function load(k){
  try{ const r = localStorage.getItem("rebuild1:"+k); if(r!==null) return JSON.parse(r); }
  catch(e){ persistent=false; showWarn(); }
  return mem[k]!==undefined ? mem[k] : null;
}
function showWarn(){ document.getElementById("storageWarn").style.display="block"; }
try{ localStorage.setItem("rebuild1:ping","1"); localStorage.removeItem("rebuild1:ping"); }
catch(e){ showWarn(); persistent=false; }

/* ================= STATE ================= */
let curTab="train", curWeek= load("curWeek")||0, curDay=null;

function logKey(w,d){ return "log:w"+w+"d"+d; }
function getLog(w,d){ return load(logKey(w,d)) || {sets:{}, note:""}; }
function saveLog(w,d,lg){ store(logKey(w,d), lg); }

/* ================= RENDER ================= */
const V = document.getElementById("view");
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function dayStatus(w,d){
  const day = getWeek(w)[d], lg = getLog(w,d);
  let done=0, total=0;
  day.exercises.forEach((e,i)=>{
    total += e.sets;
    for(let s=0;s<e.sets;s++){ const r = lg.sets[i+"-"+s]; if(r && r.done) done++; }
  });
  if(done===0) return "";
  return done>=total ? "done" : "part";
}

function renderTrain(){
  if(curDay!==null){ renderDay(); return; }
  let h = '<div class="weeks">';
  for(let w=0;w<4;w++) h += '<div class="wk'+(w===curWeek?' active':'')+'" data-w="'+w+'">WK '+(w+1)+'</div>';
  h += '</div>';
  const days = getWeek(curWeek);
  days.forEach((d,i)=>{
    const st = dayStatus(curWeek,i);
    h += '<div class="daycard'+(d.optional?' optional':'')+'" data-d="'+i+'">'
      + '<span class="status '+st+'">'+(st==="done"?"Done":st==="part"?"In progress":"Pending")+'</span>'
      + '<div class="desig">[ W'+(curWeek+1)+' · D'+(i+1)+' — '+esc(d.desig)+' ]</div>'
      + '<h3>'+esc(d.title)+'</h3>'
      + '<div class="meta">'+d.exercises.length+' exercises</div></div>';
  });
  V.innerHTML = h;
  V.querySelectorAll(".wk").forEach(el=>el.onclick=()=>{ curWeek=+el.dataset.w; store("curWeek",curWeek); renderTrain(); });
  V.querySelectorAll(".daycard").forEach(el=>el.onclick=()=>{ curDay=+el.dataset.d; renderDay(); });
}

function renderDay(){
  const day = getWeek(curWeek)[curDay];
  const lg = getLog(curWeek,curDay);
  let h = '<div class="back" id="back">← Week '+(curWeek+1)+'</div>'
    + '<div class="daytitle"><div class="desig">[ W'+(curWeek+1)+' · D'+(curDay+1)+' — '+esc(day.desig)+' ]</div>'
    + '<h2>'+esc(day.title)+'</h2><div class="note">'+esc(day.note)+'</div></div>';
  day.exercises.forEach((e,i)=>{
    let dots='';
    for(let s=0;s<e.sets;s++){ const r=lg.sets[i+"-"+s]; dots+='<div class="dot'+(r&&r.done?' f':'')+'"></div>'; }
    const rx = e.sets+' × '+e.reps + (e.load?' @ <b>'+e.load+'kg</b>':'') + (e.unit!==KG&&e.unit!==""?' '+e.unit:'');
    h += '<div class="ex" data-i="'+i+'"><div class="ex-head"><div><div class="nm">'+esc(e.name)+'</div>'
      + '<div class="rx">'+rx+'</div></div><div class="dots">'+dots+'</div></div>'
      + '<div class="ex-body">'
      + (e.cue?'<div class="cue">'+esc(e.cue)+'</div>':'')
      + '<div class="unitlbl"><span></span><span>'+(e.unit===SEC?'SEC':e.unit==='min'?'MIN':e.unit===BW?'+KG':'KG')+'</span><span>REPS</span></div>';
    for(let s=0;s<e.sets;s++){
      const r = lg.sets[i+"-"+s]||{};
      h += '<div class="setrow"><span class="sn">S'+(s+1)+'</span>'
        + '<input type="number" inputmode="decimal" step="0.5" data-i="'+i+'" data-s="'+s+'" data-f="w" value="'+(r.w!==undefined?r.w:'')+'" placeholder="'+(e.load||'—')+'">'
        + '<span class="x">×</span>'
        + '<input type="number" inputmode="numeric" data-i="'+i+'" data-s="'+s+'" data-f="r" value="'+(r.r!==undefined?r.r:'')+'" placeholder="'+esc(e.reps)+'">'
        + '<div class="chk'+(r.done?' f':'')+'" data-i="'+i+'" data-s="'+s+'">✓</div></div>';
    }
    h += '</div></div>';
  });
  h += '<div class="lbl">Session Notes (pain, RPE, anything off)</div>'
    + '<textarea class="sessnote" id="snote" placeholder="e.g. bench 45kg pain-free, slight tightness on last OHP set…">'+esc(lg.note||'')+'</textarea>';
  V.innerHTML = h;

  document.getElementById("back").onclick=()=>{ curDay=null; renderTrain(); };
  V.querySelectorAll(".ex-head").forEach(el=>el.onclick=()=>el.parentElement.classList.toggle("open"));
  V.querySelectorAll(".setrow input").forEach(inp=>{
    inp.onclick=ev=>ev.stopPropagation();
    inp.oninput=()=>{
      const lg2=getLog(curWeek,curDay), k=inp.dataset.i+"-"+inp.dataset.s;
      lg2.sets[k]=lg2.sets[k]||{};
      lg2.sets[k][inp.dataset.f==="w"?"w":"r"]=inp.value===""?undefined:+inp.value;
      saveLog(curWeek,curDay,lg2);
    };
  });
  V.querySelectorAll(".chk").forEach(c=>{
    c.onclick=ev=>{
      ev.stopPropagation();
      const lg2=getLog(curWeek,curDay), k=c.dataset.i+"-"+c.dataset.s;
      lg2.sets[k]=lg2.sets[k]||{};
      lg2.sets[k].done=!lg2.sets[k].done;
      if(lg2.sets[k].done && !lg2.date) lg2.date=new Date().toISOString().slice(0,10);
      saveLog(curWeek,curDay,lg2);
      c.classList.toggle("f");
      const exEl=c.closest(".ex"), i=+c.dataset.i, day2=getWeek(curWeek)[curDay];
      let dots='';
      for(let s=0;s<day2.exercises[i].sets;s++){ const r=lg2.sets[i+"-"+s]; dots+='<div class="dot'+(r&&r.done?' f':'')+'"></div>'; }
      exEl.querySelector(".dots").innerHTML=dots;
    };
  });
  document.getElementById("snote").oninput=e=>{
    const lg2=getLog(curWeek,curDay); lg2.note=e.target.value; saveLog(curWeek,curDay,lg2);
  };
}

function bestSet(w,d,exIdx){
  const lg=getLog(w,d); let best=null;
  Object.keys(lg.sets).forEach(k=>{
    const [i,s]=k.split("-"); if(+i!==exIdx) return;
    const r=lg.sets[k];
    if(r&&r.done&&r.w!==undefined){ if(!best||r.w>best.w||(r.w===best.w&&(r.r||0)>(best.r||0))) best=r; }
  });
  return best;
}

function renderProgress(){
  const mains=[
    {name:"Bench Press", d:0, i:0, old:130},
    {name:"Squat", d:1, i:0, old:160},
    {name:"Military Press", d:2, i:0, old:80},
    {name:"Deadlift", d:3, i:0, old:220},
  ];
  let h='<div class="card"><h3>Main Lift Log — Best Working Set Per Week</h3>';
  let any=false;
  mains.forEach(m=>{
    h+='<div class="prog-lift"><div style="font-weight:700;font-size:14px;margin-bottom:2px">'+m.name+'</div>';
    let rows='';
    for(let w=0;w<4;w++){
      const b=bestSet(w,m.d,m.i);
      if(b){ any=true;
        const pct=Math.min(100, Math.round(b.w/m.old*100));
        rows+='<div style="font-size:11px;color:var(--ink-dim);letter-spacing:.08em">WK '+(w+1)+'</div>'
          +'<div class="bar-wrap"><div class="bar" style="width:'+Math.max(pct,14)+'%">'+b.w+'kg × '+(b.r||"?")+' · '+pct+'% of PR</div></div>';
      }
    }
    h+= rows || '<div class="dim" style="font-size:12px;margin:4px 0 10px">No logged sets yet.</div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div class="card"><h3>Data</h3>'
    +'<button class="btn primary" id="expCsv">Export to Excel (CSV)</button>'
    +'<button class="btn" id="exp">Export backup (JSON)</button>'
    +'<button class="btn" id="imp">Import backup</button>'
    +'<input type="file" id="impFile" accept=".json" style="display:none">'
    +'<p class="dim">CSV opens directly in Excel / Numbers / Google Sheets. JSON is the full backup for restoring the app. Logs live on this device only — export before switching phones or clearing browser data.</p></div>';
  V.innerHTML=h;
  document.getElementById("expCsv").onclick=()=>{
    let rows=[["Week","Day","Session","Date","Exercise","Set","Weight (kg)","Reps","Completed","Session Notes"]];
    for(let w=0;w<4;w++)for(let d=0;d<5;d++){
      const lg=load(logKey(w,d)); if(!lg) continue;
      const day=getWeek(w)[d];
      day.exercises.forEach((e,i)=>{
        for(let s=0;s<e.sets;s++){
          const r=lg.sets[i+"-"+s];
          if(r&&(r.w!==undefined||r.r!==undefined||r.done)){
            rows.push(["W"+(w+1),"D"+(d+1),day.desig+" — "+day.title,lg.date||"",e.name,s+1,
              r.w!==undefined?r.w:"",r.r!==undefined?r.r:"",r.done?"Yes":"No",s===0&&i===0?(lg.note||""):""]);
          }
        }
      });
    }
    const csv=rows.map(r=>r.map(c=>{c=String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\r\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="rebuild-block1-log.csv"; a.click();
  };
  document.getElementById("exp").onclick=()=>{
    const out={};
    for(let w=0;w<4;w++)for(let d=0;d<5;d++){ const lg=load(logKey(w,d)); if(lg) out[logKey(w,d)]=lg; }
    const blob=new Blob([JSON.stringify(out,null,1)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="rebuild-block1-backup.json"; a.click();
  };
  document.getElementById("imp").onclick=()=>document.getElementById("impFile").click();
  document.getElementById("impFile").onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ const data=JSON.parse(rd.result); Object.keys(data).forEach(k=>store(k,data[k])); alert("Backup restored."); renderProgress(); }catch(err){ alert("Invalid backup file."); } };
    rd.readAsText(f);
  };
}

function renderTargets(){
  V.innerHTML=
   '<div class="card"><h3>Daily Nutrition — Cut Phase</h3>'
  +'<div class="krow"><span class="k">Calories</span><span class="v">2,250 kcal</span></div>'
  +'<div class="krow"><span class="k">Protein</span><span class="v">170 g (2.1 g/kg)</span></div>'
  +'<div class="krow"><span class="k">Fat</span><span class="v">~65 g</span></div>'
  +'<div class="krow"><span class="k">Carbs</span><span class="v">~235 g</span></div>'
  +'<div class="krow"><span class="k">Steps</span><span class="v">8–10k / day</span></div>'
  +'<div class="krow"><span class="k">Weight loss target</span><span class="v">0.4–0.6 kg / week</span></div>'
  +'<p class="dim" style="margin-top:8px">~450 kcal deficit from an estimated 2,700 maintenance at 80kg with 4–5 sessions/week. If the scale drops faster than 0.7 kg/week for two straight weeks, add 150 kcal of carbs — you\'re also rebuilding strength, and that needs fuel. Alcohol counts against calories; it also measurably cuts recovery. Weigh in 2–3× per week, same conditions, track the average.</p></div>'

  +'<div class="card"><h3>Non-Negotiable Rules</h3>'
  +'<div class="rule"><b>Sharp pain rule</b>Any sharp or pinching pain in the operated shoulder — during pressing, hanging, or pulling — end that exercise immediately, log it, and repeat last week\'s load next session.</div>'
  +'<div class="rule"><b>Bench progression gate</b>The weekly bench jump only happens if the previous week was completely pain-free at full sets. Otherwise repeat the weight.</div>'
  +'<div class="rule"><b>No muscle-up attempts</b>No transitions, no kipping, no bar-over work this block. Groundwork only. The transition under load is the single highest-risk movement for a SLAP repair at this stage.</div>'
  +'<div class="rule"><b>RPE ceilings</b>Pressing ≤7 this block. Squat/deadlift ≤8. No grinding reps anywhere. You are rebuilding a base, not testing it.</div></div>'

  +'<div class="card"><h3>Muscle-Up Roadmap → December</h3>'
  +'<div class="road"><div class="mo">JUL</div><div class="tx">This block: hang tolerance, scap control, explosive strict pull-ups, straight-bar support holds.</div></div>'
  +'<div class="road"><div class="mo">AUG</div><div class="tx">High pull-ups (bar to sternum), slow negatives from support hold, light straight-bar dips if pain-free.</div></div>'
  +'<div class="road"><div class="mo">SEP–OCT</div><div class="tx">Band-assisted transitions, chest-to-bar pull-ups with pause, deeper dip work.</div></div>'
  +'<div class="road"><div class="mo">NOV</div><div class="tx">Low/slow strict muscle-up attempts, minimal band.</div></div>'
  +'<div class="road"><div class="mo">DEC</div><div class="tx">Clean strict reps, then reintroduce flow/kipping only once strict is owned.</div></div>'
  +'<p class="dim">If any month\'s milestone produces pain, hold that phase — the calendar serves the shoulder, not the other way around.</p></div>'

  +'<div class="card"><h3>Plateau Protocol</h3>'
  +'<p><b>Trigger:</b> you miss the target reps on a main lift (bench, squat, OHP, deadlift) two sessions in a row.</p>'
  +'<p><b>Step 1 — Rule out the obvious:</b> sleep under 6.5 hrs, deficit too steep, or alcohol that week. Fix the input before touching the program.</p>'
  +'<p><b>Step 2 — Reset, don\'t grind:</b> drop that lift 5–7.5% and rebuild over 2 weeks. On pressing lifts, if the miss came with any shoulder signal, drop 10% and flag it to your physio.</p>'
  +'<p><b>Step 3 — Accessories:</b> stalled accessory ≠ plateau. Swap the variation (e.g. leg press → hack squat) and move on.</p>'
  +'<p class="dim">Anything beyond this: export the CSV and send it for recalibration. Mid-block surgery on a program should be data-driven, not vibes-driven.</p></div>'

  +'<div class="card"><h3>After Week 4</h3>'
  +'<p>Deload (–40% volume, –10% load) for 4–5 days, then Block 2: same split, heavier main-lift anchors, bench moves onto a normal progression, and MU groundwork advances per the roadmap. Bring your Week 1–4 logs back to your physio and to me for calibration.</p></div>';
}

/* ================= TABS ================= */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    curTab=t.dataset.t; curDay=null;
    if(curTab==="train")renderTrain();
    else if(curTab==="progress")renderProgress();
    else renderTargets();
  };
});
renderTrain();
